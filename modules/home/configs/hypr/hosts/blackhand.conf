# blackhand: triple monitor (left → centre → right)

# Left (portrait)
monitor=DP-3,1920x1080@60,-1080x0,1,transform,1

# Centre (Dell scaled)
monitor=DP-2,3840x2160@60,0x0,1.5

# Right (portrait)
monitor=DP-1,1920x1080@60,2560x0,1,transform,3


# Workspace mapping

# Left = 1–9
workspace=1, monitor:DP-3, default:true
workspace=2, monitor:DP-3
workspace=3, monitor:DP-3
workspace=4, monitor:DP-3
workspace=5, monitor:DP-3
workspace=6, monitor:DP-3
workspace=7, monitor:DP-3
workspace=8, monitor:DP-3
workspace=9, monitor:DP-3

# Centre = 11–19
workspace=11, monitor:DP-2, default:true
workspace=12, monitor:DP-2
workspace=13, monitor:DP-2
workspace=14, monitor:DP-2
workspace=15, monitor:DP-2
workspace=16, monitor:DP-2
workspace=17, monitor:DP-2
workspace=18, monitor:DP-2
workspace=19, monitor:DP-2

# Right = 21–29
workspace=21, monitor:DP-1, default:true
workspace=22, monitor:DP-1
workspace=23, monitor:DP-1
workspace=24, monitor:DP-1
workspace=25, monitor:DP-1
workspace=26, monitor:DP-1
workspace=27, monitor:DP-1
workspace=28, monitor:DP-1
workspace=29, monitor:DP-1